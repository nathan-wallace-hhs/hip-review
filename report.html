<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report Detail</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1 id="reportTitle">Report Detail</h1>
      <p id="reportMeta" class="muted">Loading report...</p>
      <nav class="topnav"><a href="index.html">← Back to dashboard</a></nav>
    </header>

    <main>
      <section class="panel report-actions">
        <button id="downloadMarkdown" type="button">Export Markdown</button>
        <button id="downloadJson" type="button">Export JSON</button>
        <button id="printReport" type="button">Print / Save PDF</button>
      </section>

      <section class="panel report-content" id="reportContent">
        <p class="muted">Loading report...</p>
      </section>
    </main>

    <script src="report.js"></script>
  </body>
</html>
